# Deploy CRM Agent - Docker App
name: Deploy CRM Agent

on:
  push:
    branches: [main]
    paths:
      - 'shared/services/crm-agent/**'
  workflow_dispatch:

env:
  APP_NAME: crm-agent
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      sha: ${{ github.sha }}

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: shared/services/crm-agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          sha: ${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    timeout-minutes: 20
    environment: production

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      IMAGE_TAG: latest
      HEFFL_API_KEY: ${{ secrets.HEFFL_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AGENT_SECRET: ${{ secrets.CRM_AGENT_SECRET }}

    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy with Docker
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deploying $APP_NAME"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Stop and remove existing container
          docker stop mtca-crm-agent 2>/dev/null || true
          docker rm mtca-crm-agent 2>/dev/null || true

          # Pull new image
          IMAGE="$REGISTRY/$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]'):$IMAGE_TAG"
          docker pull "$IMAGE"

          # Start container
          docker run -d \
            --name mtca-crm-agent \
            --restart unless-stopped \
            --network mtca_internal \
            -p 3200:3200 \
            -e NODE_ENV=production \
            -e PORT=3200 \
            -e HEFFL_API_KEY="$HEFFL_API_KEY" \
            -e OPENROUTER_API_KEY="$OPENROUTER_API_KEY" \
            -e OPENROUTER_MODEL="anthropic/claude-3.5-haiku" \
            -e AGENT_SECRET="$AGENT_SECRET" \
            "$IMAGE"

      - name: Wait for startup
        run: sleep 10

      - name: Health Check
        run: |
          MAX_ATTEMPTS=5
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3200/health" --max-time 10 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check PASSED!"
              exit 0
            fi
            [ $i -lt $MAX_ATTEMPTS ] && sleep 10
          done
          echo "⚠️ Health check failed"
          exit 1

      - name: Show logs
        if: always()
        run: docker logs mtca-crm-agent --tail=30

  success:
    needs: [build, deploy]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "App: $APP_NAME"
          echo "SHA: ${{ needs.build.outputs.sha }}"
