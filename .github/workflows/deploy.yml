name: Deploy CRM Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: crm-agent
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      image: ${{ steps.meta.outputs.tags }}
      sha: ${{ github.sha }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Output image info
        run: |
          echo "Image built: ${{ steps.meta.outputs.tags }}"

  deploy:
    needs: build
    runs-on: self-hosted
    timeout-minutes: 15
    environment: production

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      IMAGE_TAG: latest
      HEFFL_API_KEY: ${{ secrets.HEFFL_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AGENT_SECRET: ${{ secrets.AGENT_SECRET }}

    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy with Docker
        run: |
          echo "Deploying $APP_NAME"

          WORK_DIR="$GITHUB_WORKSPACE"
          mkdir -p "$WORK_DIR"

          # Image to use (lowercase for docker)
          IMAGE="$REGISTRY/$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]'):$IMAGE_TAG"
          echo "Using image: $IMAGE"

          # Stop and remove existing container
          docker stop mtca-crm-agent 2>/dev/null || true
          docker rm mtca-crm-agent 2>/dev/null || true

          # Pull new image
          docker pull "$IMAGE"

          # Create .env file with secrets
          printf 'NODE_ENV=production\nPORT=3200\nHEFFL_API_KEY=%s\nOPENROUTER_API_KEY=%s\nAGENT_SECRET=%s\nSESSION_TTL_MINUTES=30\nCONFIRMATION_TIMEOUT_SECONDS=300\n' \
            "$HEFFL_API_KEY" "$OPENROUTER_API_KEY" "$AGENT_SECRET" > "$WORK_DIR/.env"

          # Start container
          docker run -d \
            --name mtca-crm-agent \
            --restart unless-stopped \
            --network mtca_internal \
            --env-file "$WORK_DIR/.env" \
            -p 3200:3200 \
            "$IMAGE"

      - name: Wait for startup
        run: sleep 10

      - name: Health Check
        run: |
          echo "Checking health..."
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3200/health 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "CRM Agent is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check not passed"
          docker logs mtca-crm-agent --tail=20

      - name: Show container status
        if: always()
        run: docker ps --filter "name=crm-agent"

  success:
    needs: [build, deploy]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Success
        run: |
          echo "CRM Agent deployed successfully"
          echo "Port: 3200"
